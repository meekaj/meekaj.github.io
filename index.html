<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mihika Jain's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin: 0;
            min-height: 100vh;
            text-align: center;
            background-color: #f7f7f7;
        }
        header {
            background-color: #c4e1c5; 
            color: white; 
            padding: 20px;
            text-align: center;
            width: 100%;
        }
        main {
            width: 60%;
            margin: 20px;
            text-align: left;
        }
        ul {
            padding-left: 0; /* Remove padding-left for all ul by default */
            list-style-type: none; /* Remove bullets for all ul by default */
        }
        #skills ul {
            list-style-type: circle; /* Add bullet points only to ul inside #skills */
            padding-left: 20px; 
        }
        .project {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
        }
        .project h3 {
            color: lightblue;
        }
        .project a {
            color: #06c;
            text-decoration: none;
        }
        .project a:hover {
            text-decoration: underline;
        }
        .project img {
            width: 100%;
            max-width: 400px;
            height: auto;
        }
        footer {
            background-color: #f7f7f7;
            color: black; 
            padding: 10px;
            text-align: center;
            width: 100%;
        }
        .contact-info {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .contact-info p {
            margin: 0 10px;
        }
        .contact-info a {
            color: white;
            text-decoration: none;
        }
        .contact-info a:hover {
            text-decoration: underline;
        }
        .icon {
            padding-right: 8px;
        }
        .spacer {
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Mihika Jain</h1>
        <p>
            <i class="fas fa-envelope icon"></i><a href="mailto:mihikajain@icloud.com">mihikajain@icloud.com</a>
            <span class="spacer"></span>
            <i class="fab fa-linkedin icon"></i><a href="https://www.linkedin.com/in/mihikajain/" target="_blank">Connect with me on LinkedIn!</a>
        </p>
        <p><strong>University of Glasgow</strong> <em>- MA (Hons) Economics, 2022-2026</em></p>
    </header>
    <main>
        <section id="projects">
            <h2>Projects</h2>
            <ul id="projectList"></ul>
        </section>
        <section id="skills">
            <h2>Skills</h2>
            <ul>
                <li>Python</li>
                <li>Java</li>
                <li>Web Development</li>
            </ul>
        </section>
    </main>
    <footer>
        <p>Thank you for visiting my portfolio!</p>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
        fetch('https://api.github.com/users/meekaj/repos')
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            const projectList = document.getElementById('projectList');
            projectList.innerHTML = ''; // Clear existing entries
            data.forEach(repo => {
                if (repo.name !== 'meekaj.github.io') {  // Exclude the portfolio repository
                    const li = document.createElement('li');
                    li.className = 'project';
                    li.innerHTML = `<h3>${repo.name}</h3>
                                    <p>${repo.description || 'No description provided.'}</p>
                                    <a href="${repo.html_url}" target="_blank">View Project</a>`;
                    projectList.appendChild(li);
                }
            });
        })
        .catch(error => {
            console.error('Error fetching GitHub repositories:', error);
            const projectList = document.getElementById('projectList');
            projectList.innerHTML = `<li>Error loading projects.</li>`;
        });
    });
    </script>
</body>
</html>
